name: Generate Video for YouTube
on: workflow_dispatch

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Установка пакетов
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl jq

      - name: Ломаем защиту SoundCloud (Прямой API)
        run: |
          echo "Ищем ключи доступа..."
          # Дергаем свежий client_id прямо из JS-скриптов сайта (потому что yt-dlp болеет)
          CLIENT_ID=$(curl -sL "https://soundcloud.com/discover" | grep -oE '<script crossorigin src="https://a-v2\.sndcdn\.com/assets/[^"]+\.js"' | grep -oE 'https://[^"]+' | while read url; do curl -sL "$url" | grep -oE 'client_id:"[A-Za-z0-9]{32}"' ; done | head -n 1 | cut -d'"' -f2)
          echo "Выцепили Client ID: $CLIENT_ID"
          
          TRACK_URL="https://soundcloud.com/miralys-music/breathe"
          
          # Запрашиваем всю подноготную трека через API виджета
          curl -sL "https://api-widget.soundcloud.com/resolve?url=${TRACK_URL}&format=json&client_id=${CLIENT_ID}" > info.json
          
          # Пытаемся получить обычный MP3 стрим
          STREAM_URL=$(jq -r '.media.transcodings[] | select(.format.protocol=="progressive") | .url' info.json | head -n 1)
          
          if [ -n "$STREAM_URL" ] && [ "$STREAM_URL" != "null" ]; then
            echo "Нашли прямой MP3, качаем..."
            MP3_URL=$(curl -sL "${STREAM_URL}?client_id=${CLIENT_ID}" | jq -r '.url')
            curl -sL "$MP3_URL" -o track.mp3
          else
            echo "Прямого MP3 нет, перехватываем HLS поток..."
            HLS_URL=$(jq -r '.media.transcodings[] | select(.format.protocol=="hls") | .url' info.json | head -n 1)
            M3U8_URL=$(curl -sL "${HLS_URL}?client_id=${CLIENT_ID}" | jq -r '.url')
            # Кормим HLS-ссылку напрямую в ffmpeg, чтобы он сам всё склеил
            ffmpeg -i "$M3U8_URL" -q:a 2 track.mp3
          fi
          
          # Пиздим обложку (если у трека нет обложки, скрипт умный — возьмет аватарку юзера)
          COVER_URL=$(jq -r '.artwork_url // .user.avatar_url' info.json | sed 's/-large/-t500x500/')
          if [ "$COVER_URL" != "null" ]; then
            echo "Качаем картинку..."
            curl -sL "$COVER_URL" -o track.jpg
          fi

      - name: Рендерим видео (Магия FFmpeg)
        run: |
          COVER=$(ls track.* | grep -E '\.(jpg|png|webp|jpeg)$' | head -n 1)
          if [ -z "$COVER" ]; then
            echo "Нихуя нет картинок, ставим черный фон."
            ffmpeg -f lavfi -i color=c=black:s=800x800:d=1 -frames:v 1 fake_cover.jpg
            COVER="fake_cover.jpg"
          fi
          
          echo "Хуярим видос 16:9 с прыгающей волной..."
          ffmpeg -loop 1 -i "$COVER" -i track.mp3 -filter_complex "[0:v]scale=800:800:force_original_aspect_ratio=decrease,pad=800:800:(ow-iw)/2:(oh-ih)/2[img];[img]pad=1920:1080:(1920-800)/2:(1080-800)/2:black[bg];[1:a]showwaves=s=1920x300:colors=0xff5500:mode=cline[wave];[wave]colorkey=0x000000:0.1:0.5[twave];[bg][twave]overlay=0:H-h" -c:v libx264 -preset fast -tune stillimage -c:a aac -b:a 192k -pix_fmt yuv420p -shortest output.mp4
          
      - name: Отдаем готовый шедевр
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Video
          path: output.mp4
