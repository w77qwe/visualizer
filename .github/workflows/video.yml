name: Generate Video for YouTube
on: workflow_dispatch

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Ставим софт намертво
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          # Качаем бинарник yt-dlp напрямую, чтобы pip не ебал нам мозги
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Качаем трек и картинку
        run: |
          yt-dlp -o "track" --write-thumbnail -x --audio-format mp3 https://soundcloud.com/miralys-music/breathe

      - name: Рендерим видос
        run: |
          # Ищем обложку. Если саундклауд ее не отдал, скрипт сделает черную заглушку, чтобы ничего не наебнулось
          COVER=$(ls track.* | grep -E '\.(jpg|png|webp|jpeg)$' | head -n 1)
          if [ -z "$COVER" ]; then
            echo "Обложки нет, ебашим черный квадрат."
            ffmpeg -f lavfi -i color=c=black:s=800x800:d=1 -frames:v 1 fake_cover.jpg
            COVER="fake_cover.jpg"
          fi
          
          # Рендерим! (добавил умное масштабирование, чтобы обложка не сплющивалась, если она не квадратная)
          ffmpeg -loop 1 -i "$COVER" -i track.mp3 -filter_complex "[0:v]scale=800:800:force_original_aspect_ratio=decrease,pad=800:800:(ow-iw)/2:(oh-ih)/2[img];[img]pad=1920:1080:(1920-800)/2:(1080-800)/2:black[bg];[1:a]showwaves=s=1920x300:colors=0xff5500:mode=cline[wave];[wave]colorkey=0x000000:0.1:0.5[twave];[bg][twave]overlay=0:H-h" -c:v libx264 -preset fast -tune stillimage -c:a aac -b:a 192k -pix_fmt yuv420p -shortest output.mp4
          
      - name: Выгружаем готовый видос
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Video
          path: output.mp4
