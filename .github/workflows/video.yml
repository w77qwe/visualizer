name: Generate Video for YouTube
on: workflow_dispatch # Чтобы запускать ручками с кнопки

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Установка софта
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Качаем трек и обложку с SoundCloud
        run: |
          # Эта хуйня сама достанет mp3 и картинку из твоей ссылки
          yt-dlp -o "track" --write-thumbnail -x --audio-format mp3 https://soundcloud.com/miralys-music/breathe

      - name: Рендерим видео с визуализатором 
        run: |
          # Ищем скачанную обложку (может быть jpg, png или webp)
          COVER=$(ls track.* | grep -E '\.(jpg|png|webp)$' | head -n 1)
          
          # Магия FFmpeg: черный фон 16:9, обложка по центру, снизу прыгает оранжевая волна
          ffmpeg -loop 1 -i "$COVER" -i track.mp3 -filter_complex "[0:v]scale=800:800[img];[img]pad=1920:1080:(1920-800)/2:(1080-800)/2:black[bg];[1:a]showwaves=s=1920x300:colors=0xff5500:mode=cline[wave];[wave]colorkey=0x000000:0.1:0.5[twave];[bg][twave]overlay=0:H-h" -c:v libx264 -tune stillimage -c:a aac -b:a 192k -pix_fmt yuv420p -shortest output.mp4
          
      - name: Выгружаем готовый видос
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Video
          path: output.mp4
